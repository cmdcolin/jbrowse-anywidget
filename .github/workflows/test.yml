name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # the floor from pyproject's requires-python, and current
        python: ['3.9', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      # no network in these: they cover the config builders and the
      # Python <-> JS trait contract the bundle depends on
      - run: pytest -q

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
      - run: ruff check
      - run: ruff format --check

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # npx rather than `pnpm install`, which can't resolve the link: dependency
      # on the sibling jbrowse-components checkout that isn't present here
      - run: npx prettier@3 --check .
